<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PinSheet · Minigames Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Barlow+Condensed:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    transform-origin: center center;
  }
  #stage > * { width: 100%; height: 100%; }
  @media print { #stage { transform: none !important; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"></div>

<script type="text/babel" src="minigames-menu.jsx"></script>
<script type="text/babel">
  function App() {
    return <MinigamesMenu />;
  }
  ReactDOM.createRoot(document.getElementById('stage')).render(<App />);

  // Scale the 1920x1080 stage to fit the viewport
  function fit() {
    const stage = document.getElementById('stage');
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const s = Math.min(sx, sy);
    stage.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>
</body>
</html>
