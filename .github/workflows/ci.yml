name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev

jobs:
  test:
    name: Python Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pinsheet (parent)
        uses: actions/checkout@v4
        with:
          repository: BitNinja01/pinsheet-server
          path: pinsheet
          ref: dev

      - name: Checkout minigames (plugin)
        uses: actions/checkout@v4
        with:
          path: pinsheet/plugins/pinsheet-minigames

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pinsheet/requirements.txt
          pip install pytest

      - name: Compile all Python files
        run: |
          find pinsheet/plugins/pinsheet-minigames -name "*.py" -not -path "*/tests/*" -exec python -m py_compile {} +
          find pinsheet/plugins/pinsheet-minigames/tests -name "*.py" -exec python -m py_compile {} +
          echo "*** All Python files compiled successfully"

      - name: Run tests
        run: |
          cd pinsheet
          PYTHONPATH=source:plugins pytest plugins/pinsheet-minigames/tests/ -v

      - name: Check for secrets in tracked files
        run: |
          cd pinsheet/plugins/pinsheet-minigames
          if git ls-files | grep -E '(\.env|credentials\.json|.*secret.*|.*password.*)'; then
            echo "*** Sensitive files detected in tracked files"
            exit 1
          fi
          echo "*** No sensitive files tracked"
