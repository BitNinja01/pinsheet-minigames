name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build source zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          SHARED="*.py static/ templates/ requirements.txt README.md LICENSE"

          OUT="dist/pinsheet-minigames_${VERSION}.zip"
          zip -r "$OUT" $SHARED \
            -x "*/__pycache__/*" \
            -x "*.pyc"

          echo "Created: $OUT"
          ls -lh dist/

      - name: Fetch release notes from merged PR
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PR_BODY=$(gh pr list --state merged --base main --limit 1 --json body --jq '.[0].body')
          if [ -z "$PR_BODY" ]; then
            echo "notes=Release $VERSION" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$PR_BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/pinsheet-minigames_${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
