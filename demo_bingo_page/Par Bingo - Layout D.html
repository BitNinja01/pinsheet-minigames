<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PinSheet · Par Bingo — Layout D</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Barlow+Condensed:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; }
  html, body { background: #0a0a09; overflow: hidden; height: 100%; }
  #root { height: 100%; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="minigames-shared.jsx"></script>
<script type="text/babel" src="minigames-layout-d.jsx"></script>
<script type="text/babel">
  function App() {
    // Scale the 1920×1080 frame to fit the viewport
    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
      const fit = () => {
        const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        setScale(s);
      };
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    return (
      <React.Fragment>
        <style>{MG_STYLES}</style>
        <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
          <LayoutD />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
